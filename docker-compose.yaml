
services:
  # Serviciul pentru Baza de Date
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: socialapp-db
    ports:
      - "1433:1433" # pentru 'dotnet ef'
    environment:
      ACCEPT_EULA: "Y"
      # Use a strong SA password (min 8 chars, upper, lower, digit, special)
      MSSQL_SA_PASSWORD: "NinelCatel1!"
    volumes:
      - mssql_data:/var/opt/mssql # Persistă datele

  # Serviciul pentru Web
  webapp:
    container_name: socialapp-web
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080" # Expune portul aplicației
    environment:
      # Docker env overrides ConnectionStrings:DefaultConnection
      ConnectionStrings__DefaultConnection: "Server=database,1433;Database=SocialAppDB;User=sa;Password=NinelCatel1!;TrustServerCertificate=True"
      # let app know it's running in a container so it can skip HTTPS redirect
      DOTNET_RUNNING_IN_CONTAINER: "true"
    depends_on:
      - database

volumes:
  mssql_data:
